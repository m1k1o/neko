name: Build and Push to GHCR for Intel

on:
  push:
    tags:
      - 'v*'

jobs:
  check-latest:
    name: Check if Latest Version
    uses: ./.github/workflows/check_latest.yml

  build-base:
    name: Base Image
    needs: check-latest
    uses: ./.github/workflows/image_base.yml
    with:
      flavor: intel
      platforms: linux/amd64
      dockerfile: Dockerfile.intel
      latest: ${{ needs.check-latest.outputs.is_latest == 'true' }}
      latest_major: ${{ needs.check-latest.outputs.is_latest_major == 'true' }}
    secrets: inherit

  build-app:
    name: App Image
    uses: ./.github/workflows/image_app.yml
    needs: [build-base, check-latest]
    strategy:
      # Will build all images even if some fail.
      fail-fast: false
      matrix:
        include:
          - name: firefox
          - name: waterfox
          - name: chromium
          - name: google-chrome
          - name: ungoogled-chromium
          - name: microsoft-edge
          - name: brave
          - name: vivaldi
          - name: opera
          - name: tor-browser
          - name: remmina
          - name: vlc
          - name: xfce
          - name: kde
    with:
      name: ${{ matrix.name }}
      flavor: intel
      platforms: ${{ matrix.platforms }}
      dockerfile: ${{ matrix.dockerfile }}
      latest: ${{ needs.check-latest.outputs.is_latest == 'true' }}
      latest_major: ${{ needs.check-latest.outputs.is_latest_major == 'true' }}
    secrets: inherit
