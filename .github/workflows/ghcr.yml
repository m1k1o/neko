name: Build and Push to GHCR

on:
  push:
    tags:
      - 'v*'

jobs:
  check-latest:
    name: Check if Latest Version
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if this is the latest semver tag
        id: check
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [[ "$LATEST" == "$GITHUB_REF_NAME" ]]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

  build-base:
    name: Base Image
    needs: check-latest
    uses: ./.github/workflows/image_base.yml
    with:
      platforms: linux/amd64,linux/arm64
      latest: ${{ needs.check-latest.outputs.is_latest == 'true' }}
    secrets: inherit

  build-app:
    name: App Image
    uses: ./.github/workflows/image_app.yml
    needs: [build-base, check-latest]
    strategy:
      # Will build all images even if some fail.
      fail-fast: false
      matrix:
        include:
          - name: firefox
            platforms: linux/amd64,linux/arm64
          - name: waterfox
            platforms: linux/amd64
          - name: chromium
            platforms: linux/amd64,linux/arm64
          - name: google-chrome
            platforms: linux/amd64
          - name: ungoogled-chromium
            platforms: linux/amd64
          - name: microsoft-edge
            platforms: linux/amd64
          - name: brave
            platforms: linux/amd64,linux/arm64
          - name: vivaldi
            platforms: linux/amd64,linux/arm64
          - name: opera
            platforms: linux/amd64
          - name: tor-browser
            platforms: linux/amd64
          - name: remmina
            platforms: linux/amd64,linux/arm64
          - name: vlc
            platforms: linux/amd64,linux/arm64
          - name: xfce
            platforms: linux/amd64,linux/arm64
          - name: kde
            platforms: linux/amd64,linux/arm64
    with:
      name: ${{ matrix.name }}
      platforms: ${{ matrix.platforms }}
      latest: ${{ needs.check-latest.outputs.is_latest == 'true' }}
    secrets: inherit
